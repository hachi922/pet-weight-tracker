<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペット体重管理</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<div class="app" id="app">
  <div class="toast" id="toast"></div>
  <div class="content">

    <!-- 体重記録 -->
    <div class="panel active" id="panel0">
      <div class="tbl-wrap">
        <table>
          <colgroup><col style="width:64px"><col><col><col></colgroup>
          <thead><tr>
            <th>日付</th>
            <th id="h0">ぴっぴ<br><span class="unit">(g)</span></th>
            <th id="h1">もも<br><span class="unit">(g)</span></th>
            <th id="h2">きな<br><span class="unit">(g)</span></th>
          </tr></thead>
          <tbody id="weightBody"></tbody>
        </table>
      </div>
      <button class="add-row-btn" onclick="addRow()"><i class="ti ti-plus"></i> 行を追加</button>
    </div>

    <!-- グラフ -->
    <div class="panel" id="panel1">
      <div class="charts-wrap" id="chartsWrap"></div>
    </div>

    <!-- 通院メモ -->
    <div class="panel" id="panel2">
      <div class="vet-list" id="vetList"></div>
      <div class="add-vet-form">
        <div class="form-section-title"><i class="ti ti-plus"></i> 通院記録を追加</div>
        <div class="form-row">
          <div class="form-col"><label>日付</label><input type="date" id="vetDate"></div>
          <div class="form-col"><label>費用（円）</label><input type="number" id="vetCost" placeholder="3500"></div>
        </div>
        <div class="form-col" style="margin-bottom:8px">
          <label>治療・検査内容</label>
          <textarea id="vetNotes" placeholder="定期健診、体重測定、爪切りなど"></textarea>
        </div>
        <button class="save-btn" onclick="addVet()"><i class="ti ti-device-floppy"></i> 保存</button>
      </div>
    </div>

    <!-- 設定 -->
    <div class="panel" id="panel3">
      <div class="settings-section">
        <div class="settings-title"><i class="ti ti-paw"></i> ペットの名前</div>
        <div class="pet-name-rows">
          <div class="pet-name-row"><label>1羽め</label><input type="text" id="name0" value="ぴっぴ" oninput="updateHeaders()"></div>
          <div class="pet-name-row"><label>2羽め</label><input type="text" id="name1" value="もも" oninput="updateHeaders()"></div>
          <div class="pet-name-row"><label>3羽め</label><input type="text" id="name2" value="きな" oninput="updateHeaders()"></div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-title"><i class="ti ti-palette"></i> テーマカラー</div>
        <div class="color-grid" id="colorGrid"></div>
        <div class="color-label" id="colorLabel">現在：ラベンダー</div>
      </div>
      <div class="settings-section">
        <div class="settings-title"><i class="ti ti-database"></i> バックアップ</div>
        <div class="backup-btns">
          <button class="backup-btn" onclick="exportJSON()">
            <i class="ti ti-download"></i>
            <div class="backup-btn-text"><span>JSONエクスポート</span><span class="backup-btn-sub">全データをJSONファイルで保存</span></div>
          </button>
          <button class="backup-btn" onclick="exportCSV()">
            <i class="ti ti-table-export"></i>
            <div class="backup-btn-text"><span>CSVエクスポート</span><span class="backup-btn-sub">体重・通院データをCSVで保存</span></div>
          </button>
          <button class="backup-btn" onclick="document.getElementById('importFile').click()">
            <i class="ti ti-upload"></i>
            <div class="backup-btn-text"><span>インポート</span><span class="backup-btn-sub">JSONバックアップファイルから復元</span></div>
          </button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
        </div>
      </div>
    </div>

  </div>

  <nav class="bottom-tabs" role="tablist">
    <button class="btab active" onclick="switchTab(0)" role="tab" aria-label="体重記録"><i class="ti ti-scale"></i>体重記録</button>
    <button class="btab" onclick="switchTab(1)" role="tab" aria-label="グラフ"><i class="ti ti-chart-line"></i>グラフ</button>
    <button class="btab" onclick="switchTab(2)" role="tab" aria-label="通院メモ"><i class="ti ti-stethoscope"></i>通院メモ</button>
    <button class="btab" onclick="switchTab(3)" role="tab" aria-label="設定"><i class="ti ti-settings"></i>設定</button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
